<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Components NGUI Demo</title>
  
  <link rel="stylesheet" href="/assets/rhds/normalize.min.css">
  <link rel="stylesheet" href="/assets/rhds/tokens.css">
  <link rel="stylesheet" href="/assets/rhds/pf-theming.css">
  
  <script type="importmap">
    {
      "imports": {
        "@rhds/elements/": "/assets/rhds/dependencies/@rhds/elements/elements/"
      },
      "scopes": {
        "/assets/rhds/dependencies/": {
            "@lit/context": "/assets/rhds/dependencies/@lit/context/development/index.js",
            "@lit/reactive-element": "/assets/rhds/dependencies/@lit/reactive-element/reactive-element.js",
            "@lit/reactive-element/decorators/": "/assets/rhds/dependencies/@lit/reactive-element/decorators/",
            "@patternfly/pfe-core": "/assets/rhds/dependencies/@patternfly/pfe-core/core.js",
            "@patternfly/pfe-core/": "/assets/rhds/dependencies/@patternfly/pfe-core/",
            "@rhds/elements/lib/": "/assets/rhds/dependencies/@rhds/elements/lib/",
            "@rhds/icons": "/assets/rhds/dependencies/@rhds/icons/icons.js",
            "@rhds/icons/": "/assets/rhds/dependencies/@rhds/icons/",
            "@rhds/tokens/media.js": "/assets/rhds/dependencies/@rhds/tokens/js/media.js",
            "@rhds/tokens/": "/assets/rhds/dependencies/@rhds/tokens/",
            "lit": "/assets/rhds/dependencies/lit/index.js",
            "lit/": "/assets/rhds/dependencies/lit/",
            "lit-element/lit-element.js": "/assets/rhds/dependencies/lit-element/lit-element.js",
            "lit-html": "/assets/rhds/dependencies/lit-html/lit-html.js",
            "lit-html/": "/assets/rhds/dependencies/lit-html/",
            "tslib": "/assets/rhds/dependencies/tslib/tslib.es6.js"
        }
      }
    }
  </script>

  <script type="module">
    import "@rhds/elements/rh-accordion/rh-accordion.js";
    import "@rhds/elements/rh-alert/rh-alert.js";
    import "@rhds/elements/rh-announcement/rh-announcement.js";
    import "@rhds/elements/rh-audio-player/rh-audio-player.js";
    import "@rhds/elements/rh-avatar/rh-avatar.js";
    import "@rhds/elements/rh-back-to-top/rh-back-to-top.js";
    import "@rhds/elements/rh-badge/rh-badge.js";
    import "@rhds/elements/rh-blockquote/rh-blockquote.js";
    import "@rhds/elements/rh-breadcrumb/rh-breadcrumb.js";
    import "@rhds/elements/rh-button/rh-button.js";
    import "@rhds/elements/rh-card/rh-card.js";
    import "@rhds/elements/rh-chip/rh-chip.js";
    import "@rhds/elements/rh-code-block/rh-code-block.js";
    import "@rhds/elements/rh-cta/rh-cta.js";
    import "@rhds/elements/rh-dialog/rh-dialog.js";
    import "@rhds/elements/rh-disclosure/rh-disclosure.js";
    import "@rhds/elements/rh-footer/rh-footer.js";
    import "@rhds/elements/rh-health-index/rh-health-index.js";
    import "@rhds/elements/rh-icon/rh-icon.js";
    import "@rhds/elements/rh-jump-links/rh-jump-links.js";
    import "@rhds/elements/rh-menu-dropdown/rh-menu-dropdown.js";
    import "@rhds/elements/rh-navigation-primary/rh-navigation-primary.js";
    import "@rhds/elements/rh-navigation-secondary/rh-navigation-secondary.js";
    import "@rhds/elements/rh-navigation-vertical/rh-navigation-vertical.js";
    import "@rhds/elements/rh-pagination/rh-pagination.js";
    import "@rhds/elements/rh-progress-stepper/rh-progress-stepper.js";
    import "@rhds/elements/rh-scheme-toggle/rh-scheme-toggle.js";
    import "@rhds/elements/rh-site-status/rh-site-status.js";
    import "@rhds/elements/rh-skeleton/rh-skeleton.js";
    import "@rhds/elements/rh-skip-link/rh-skip-link.js";
    import "@rhds/elements/rh-spinner/rh-spinner.js";
    import "@rhds/elements/rh-stat/rh-stat.js";
    import "@rhds/elements/rh-subnav/rh-subnav.js";
    import "@rhds/elements/rh-surface/rh-surface.js";
    import "@rhds/elements/rh-switch/rh-switch.js";
    import "@rhds/elements/rh-table/rh-table.js";
    import "@rhds/elements/rh-tabs/rh-tabs.js";
    import "@rhds/elements/rh-tag/rh-tag.js";
    import "@rhds/elements/rh-tile/rh-tile.js";
    import "@rhds/elements/rh-timestamp/rh-timestamp.js";
    import "@rhds/elements/rh-tooltip/rh-tooltip.js";
    import "@rhds/elements/rh-video-embed/rh-video-embed.js";
  </script>

</head>
<body>
  <rh-card>
    <img slot="image" src="/assets/pf-logo.png" alt="Server Information">
    <h2 slot="header">Server Information</h2>
    <dl>
      <div>
        <dt>Hostname</dt>
        <dd>server-01.example.com</dd>
      </div>
      <div>
        <dt>IP Address</dt>
        <dd>192.168.1.100</dd>
      </div>
      <div>
        <dt>Status</dt>
        <dd>Running</dd>
      </div>
      <div>
        <dt>Uptime</dt>
        <dd>45 days</dd>
      </div>
    </dl>
  </rh-card>
</body>
</html>
